# @package _global_
# FlowGRPO-Fast SD3 colocate — VeOmni FSDP2 backend parity twin.
#
# Byte-twin of sd3_trainside.yaml except (1) backend._target_ selects
# VeOmniBackend and (2) the bundle builds the transformer on the meta device
# (VeOmni's parallelize asserts meta init; the backend loads real weights
# from <ckpt>/transformer post-shard, and the bundle's CPU-twin restore
# repairs init-computed state like PatchEmbed's non-persistent pos_embed).
#
# PRETRAINED_MODEL must point at a LOCAL SD3.5-medium dir for this recipe
# (the post-shard load reads <path>/transformer/*.safetensors directly).

num_devices: 8
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
# samples_per_prompt lives inside `sampling` (DiffusionSamplingParams).

# Distributed transport backend (DevicePool). Defaults below are also applied
# when these keys are absent, so other recipes need not set them.
#   colocate_store — one Worker per GPU, single-slot, leak-free (requires workers_per_device=1)
#   gpu_store      — colocated multi-slot via a shared per-GPU TensorWorker (set workers_per_device>=2)
#   transfer_queue — GLOBAL queue plane; also add a `transfer_queue:` block (example below)
transport_kind: colocate_store
workers_per_device: 1

logging:
  report_to_wandb: false        # flip to true to enable wandb (rank-0/driver only)
  project_name: unirl
  run_name: null
  entity: null
  tags: null

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    autocast_precision: bf16
    trajectory_precision: bf16
    logprob_precision: fp32
    shift: 3.0
    # VeOmniBackend lifecycle: transformer architecture on meta, weights
    # loaded post-parallelize by the backend.
    meta_init_transformer: true

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.veomni.backend.VeOmniBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false   # matches sd3_trainside (reference uses bf16_full_ac)
    # SP disabled: SD3 @512² is ~1357 tokens (below the SP memory threshold), and its
    # fixed 77+256=333 text stream is divisible by no sp>1 (coprime with the 1024 image
    # tokens), which the diffusion SP divisibility guard now rejects. The VeOmni FSDP2
    # backend still applies here; correct diffusion SP needs the latent-only / text-
    # replicate follow-up + a long-sequence config before sp>1 is meaningful for SD3.
    sp_size: 1
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  # SD3 VAE decode on 96 fp32 latents at once (batch_size=48 × samples_per_prompt=16
  # / 8 devices) peaks ~24 GB on an H20 and OOMs alongside the resident text
  # encoders. Chunk forward into 16-sample groups (= samples_per_prompt so groups
  # never straddle a chunk boundary, matters once init_same_noise flips on).
  forward_batch_size: 16

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  # Trainside samples at forward_batch_size=16 but trains at micro_batch_size=1, and
  # bf16 forwards are batch-shape sensitive, so the on-policy ratio is exactly 1 only
  # when pi_old is recomputed at the train micro-geometry. `replay` does that (the
  # train stack drives prepare_segment over the same slices it trains on; see
  # TrainStack.prepare_segment). Recipes that already sample and train at the same
  # batch (forward_batch_size == micro_batch_size) can keep the default `rollout`.
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  # Algorithm.compute_loss_and_backward calls stage.replay(params=self.params)
  # and needs the same guidance_scale / eta the rollout sampled with. Bind to
  # the sampling block; OmegaConf serializes a copy and the worker materializes
  # a second DiffusionSamplingParams instance per role (cheap metadata).
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  # Real prompts loaded from file: MultimodalRLDataSource reads TXT/JSON/JSONL
  # via data_path and exposes get_samples(bs). (DefaultDataSource returns only
  # 8 hardcoded prompts — smoke-test use; training on it over-optimizes/collapses.)
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt        # relative to repo cwd (Hydra 1.3 no-chdir)
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  # SDE step schedule: which denoising steps record SDE log-probs.
  # num_sde_steps: null = all steps; int = sparse subset; 0 = none (NFT).
  # A static `sde_indices: [...]` overrides this. (WindowScheduler also available.)
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 3
    # SDE-step window: [0,0.5] confines SDE noise to the early high-σ steps
    # (the validated reproduce setting); [0,1] spreads it across all steps.
    timestep_fraction: [0, 0.5]
